version: '3.8'

services:
  translate:
    # LibreTranslate wraps Helsinki-NLP OPUS-MT models (en->zh here).
    # Purpose-built NMT: no hallucination, very small memory footprint.
    image: libretranslate/libretranslate:latest
    container_name: lavanews-translate
    restart: unless-stopped
    environment:
      - LT_LOAD_ONLY=en,zh
      - LT_CHAR_LIMIT=2000
      - LT_DISABLE_WEB_UI=true
      - LT_THREADS=2
    volumes:
      - translate-models:/home/libretranslate/.local/share/argos-translate
    expose:
      - "5000"
    networks:
      - lavanews-net
    mem_limit: 2g
    mem_reservation: 512m

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavanews-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - TRANSLATE_URL=http://translate:5000
    volumes:
      - app-data:/app/prisma
    expose:
      - "3000"
    depends_on:
      - translate
    networks:
      - lavanews-net

  nginx:
    image: nginx:alpine
    container_name: lavanews-nginx
    restart: unless-stopped
    ports:
      - "41873:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lavanews-net

volumes:
  app-data:
  translate-models:

networks:
  lavanews-net:
    driver: bridge

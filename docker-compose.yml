version: '3.8'

services:
  ollama:
    image: ollama/ollama:latest
    container_name: lavanews-ollama
    restart: unless-stopped
    volumes:
      - ollama-models:/root/.ollama
    expose:
      - "11434"
    networks:
      - lavanews-net
    # Cap memory so a runaway model can't OOM the 8GB box.
    # Qwen2.5-1.5B Q4 uses ~1.5-2GB; 3GB gives headroom for prompt buffers.
    mem_limit: 3g
    mem_reservation: 1g

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavanews-app
    restart: unless-stopped
    env_file:
      - .env.production
    environment:
      - OLLAMA_URL=http://ollama:11434
      - TRANSLATE_MODEL=qwen2.5:1.5b-instruct-q4_K_M
    volumes:
      - app-data:/app/prisma
    expose:
      - "3000"
    depends_on:
      - ollama
    networks:
      - lavanews-net

  nginx:
    image: nginx:alpine
    container_name: lavanews-nginx
    restart: unless-stopped
    ports:
      - "41873:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lavanews-net

volumes:
  app-data:
  ollama-models:

networks:
  lavanews-net:
    driver: bridge

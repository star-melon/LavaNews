version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: lavanews-app
    restart: unless-stopped
    env_file:
      - .env.production
    volumes:
      - app-data:/app/prisma
    expose:
      - "3000"
    networks:
      - lavanews-net

  nginx:
    image: nginx:alpine
    container_name: lavanews-nginx
    restart: unless-stopped
    ports:
      - "41873:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lavanews-net

volumes:
  app-data:

networks:
  lavanews-net:
    driver: bridge
